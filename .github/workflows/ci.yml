name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: cob_performance
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cob_performance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # Same schema/seed a developer gets from `docker compose up db` -- see
      # docker-compose.yml and DEPLOY.md.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cob_performance
    steps:
      - uses: actions/checkout@v4

      - name: Load schema and seed data
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/schema/target_schema.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/seed/load_uploaded_seed.sql

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.2'

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev libsodium-dev libcurl4-openssl-dev libssl-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install R packages
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://cloud.r-project.org")); pkgs <- c("shiny", "DBI", "RPostgres", "jsonlite", "sodium", "curl", "future", "promises", "testthat"); missing <- setdiff(pkgs, rownames(installed.packages())); if (length(missing)) install.packages(missing)'

      - name: Run tests
        run: Rscript tests/testthat.R
